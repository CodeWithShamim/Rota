[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./" }]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[lint]
# Deadline comparisons against block.timestamp are the core domain model here
# (round windows, unlock deadlines); second-level validator drift is immaterial
# for durations measured in days/weeks. Documented in SECURITY.md.
exclude_lints = ["block-timestamp"]

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32
fail_on_revert = false

[rpc_endpoints]
local = "http://127.0.0.1:8545"
arc_testnet = "https://rpc.testnet.arc.network"
